services:

  back:
    build:
      context: .
      dockerfile: ./dockerfile
    container_name: back
    restart: always
    env_file:
      - ${ENV_FILE:-./.env}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    mem_limit: 1G
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"http=require('http');http.get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db_migration:
    image: back
    command: ["node", "node_modules/.bin/prisma", "migrate", "deploy"]
    env_file:
      - ${ENV_FILE:-./.env}
    restart: "no"
    
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - back